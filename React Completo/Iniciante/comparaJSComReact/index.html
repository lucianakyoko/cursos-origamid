<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Básico</title>

    <!-- Este é o mesmo código do arquivo "reactBasico/index.html", porém, desenvolvido em Vanila JS -->
    
  </head>
  <body>
     <div id="app">
       <p>Total: <span id="total"></span></p>
       <p>Preço: R$ <span id="preco"></span></p>
       <button id="button">Comprar</button>
     </div> 



    <script type="application/javascript">
      const total = document.getElementById('total');
      const preco = document.getElementById('preco');
      const button = document.getElementById('button');

      let contador = 1;

      const atualizaValores = contador => {
        total.innerText = contador;
        preco.innerText = contador * 250;
      };

      const handleClick = event => {
        contador++;
        atualizaValores(contador)
      };
      
      atualizaValores(contador);

      button.addEventListener('click', handleClick);





    </script>
  </body>
</html>
